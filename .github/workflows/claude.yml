name: Claude

# The BUILDER. Responds to @claude mentions in issues / PRs / comments and does the
# work (opening or updating a PR). The autonomous orchestrator (v2-autobuild.yml) posts
# those mentions to drive each phase.
#
# AUTH: uses a Claude Code SUBSCRIPTION (Pro/Max) via CLAUDE_CODE_OAUTH_TOKEN — no
# metered API billing. Generate it once with `claude setup-token` and add it as the
# repo secret CLAUDE_CODE_OAUTH_TOKEN. (An ANTHROPIC_API_KEY secret also works as a
# fallback if you ever switch to a pay-per-use key.)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only fire when "@claude" is actually mentioned, to avoid burning runs on every comment.
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (preferred, no API billing). Falls back to an API key
          # if that's the secret you set instead.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The builder reads v2/ROADMAP.md + v2/DECISIONS.md fresh each invocation
          # (fresh context per run) and honors the standing rules — see the @claude
          # issue body the orchestrator posts.
