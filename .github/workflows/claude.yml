name: Claude

# The BUILDER. Responds to @claude mentions in issues / PRs / comments and does the
# work (opening or updating a PR). The autonomous orchestrator (v2-autobuild.yml) posts
# those mentions to drive each phase. Requires the ANTHROPIC_API_KEY repo secret.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only fire when "@claude" is actually mentioned, to avoid burning runs on every comment.
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Give the builder the context it needs every run (fresh context each invocation):
          # it must read the roadmap + decisions and honor the standing rules.
