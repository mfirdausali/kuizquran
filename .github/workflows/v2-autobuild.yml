name: v2 Autobuild (orchestrator)

# Drives the v2 ROADMAP autonomously, phase by phase, to completion — no human gate
# (user-chosen: fully autonomous, merge-everything). It:
#   1. reads v2/.build-state to find the next unbuilt phase N,
#   2. runs the Claude Code action DIRECTLY (prompt input) to build Phase N → opens a PR
#      on a branch and appends last_completed=N to v2/.build-state,
#   3. enables GitHub auto-merge on that PR so it merges the moment CI (ci.yml) is green,
#   4. the merge re-triggers this workflow → phase N+1, until all phases are done.
#
# WHY DIRECT INVOCATION (not an @claude issue): GitHub suppresses workflow triggers for
# events created via GITHUB_TOKEN, so an orchestrator-posted @claude issue never fires
# claude.yml. Calling the action inline avoids that entirely — no PAT needed.
#
# Wait-on-limit: the `schedule` cron re-runs; if a phase PR is already open it just
# re-asserts auto-merge; if the build stalled it retries the current phase.
#
# SAFE FAILURE MODE: a phase whose CI keeps failing never auto-merges; the loop stalls
# on it (visible as no progress) rather than merging corruption.

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "0 * * * *"      # hourly: resume after usage-limit / stalled runs
  workflow_dispatch:
    inputs:
      start_phase:
        description: "Phase to (re)start from (blank = resume from state file)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  LAST_PHASE: 7
  STATE_FILE: v2/.build-state

jobs:
  drive:
    if: >
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next phase
        id: phase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LAST=-1
          [ -f "$STATE_FILE" ] && LAST="$(grep -oE 'last_completed=[0-9-]+' "$STATE_FILE" | cut -d= -f2 || echo -1)"
          OVERRIDE="${{ github.event.inputs.start_phase }}"
          if [ -n "$OVERRIDE" ]; then NEXT="$OVERRIDE"; else NEXT=$((LAST + 1)); fi
          echo "last=$LAST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ "$NEXT" -gt "$LAST_PHASE" ]; then echo "done=true" >> "$GITHUB_OUTPUT"; else echo "done=false" >> "$GITHUB_OUTPUT"; fi
          # If a phase-N PR is already open, we resume (re-assert auto-merge) instead of rebuilding.
          OPEN=$(gh pr list --state open --search "in:title v2 Phase $NEXT" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          echo "open_pr=$OPEN" >> "$GITHUB_OUTPUT"
          echo "branch=claude/v2-phase-$NEXT" >> "$GITHUB_OUTPUT"

      # ---------- all phases complete ----------
      - name: Stop — all phases complete
        if: steps.phase.outputs.done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTS=$(gh issue list --state all --search "v2 build complete in:title" --json number --jq '.[0].number // empty' || true)
          if [ -z "$EXISTS" ]; then
            gh issue create --title "🎉 v2 build complete" \
              --body "All roadmap phases 0–$LAST_PHASE are merged. Review the result end-to-end and run it locally before shipping — autonomy produced a candidate, not a guarantee." || true
          fi

      # ---------- resume: a phase PR is already open ----------
      - name: Re-assert auto-merge on the open phase PR
        if: steps.phase.outputs.done == 'false' && steps.phase.outputs.open_pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.phase.outputs.open_pr }}" --auto --squash || true

      # ---------- build the next phase directly with Claude Code ----------
      - name: Build Phase ${{ steps.phase.outputs.next }} with Claude Code
        if: steps.phase.outputs.done == 'false' && steps.phase.outputs.open_pr == ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Direct headless prompt — build exactly this phase and open a PR.
          prompt: |
            Execute **Phase ${{ steps.phase.outputs.next }}** of the iman.app v2 build.

            READ FIRST (authoritative): `v2/ROADMAP.md` (the phase spec + exit criteria)
            and `v2/DECISIONS.md` (the locked decisions). Honor every decision, the
            invariants (#1 ayah-as-unit, #2 append-only/commit-before-feedback, #5
            Amiri-largest/coral-slips-only, #6 logic-in-engine), and the standing
            decision-logging rule in `v1/CLAUDE.md` (append any new decision to
            `v2/DECISIONS.md` with a real `date -u` timestamp).

            DO ONLY Phase ${{ steps.phase.outputs.next }} — do not start later phases.

            Requirements:
            - Implement exactly what this phase specifies; reuse v1 assets marked
              "port as-is", rebuild only what's marked "rebuild".
            - Add/keep tests so this phase's exit-criterion suite is green (CI gates the
              merge). If a project has no tests yet that is acceptable for scaffolding.
            - When done, append `last_completed=${{ steps.phase.outputs.next }}` (with a
              one-line note) to `v2/.build-state` so the loop advances.
            - Commit to a NEW branch `${{ steps.phase.outputs.branch }}` and open a PR
              whose TITLE STARTS WITH "v2 Phase ${{ steps.phase.outputs.next }}:".
            - If the phase needs a human decision the roadmap flags as open (v2-O1,
              language default, first-shippable scope), pick the simplest reasonable
              default consistent with DECISIONS.md, log it as a new decision, and
              proceed — do NOT stall (the loop is fully autonomous by operator choice).
          # Let the agent create branches, commit, and open PRs.
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"

      # ---------- turn on auto-merge for the freshly-opened PR ----------
      - name: Enable auto-merge on the new phase PR
        if: steps.phase.outputs.done == 'false' && steps.phase.outputs.open_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 15
          PR=$(gh pr list --state open --search "in:title v2 Phase ${{ steps.phase.outputs.next }}" --json number --jq '.[0].number // empty' || true)
          if [ -n "$PR" ]; then
            echo "Enabling auto-merge on PR #$PR"
            gh pr merge "$PR" --auto --squash || true
          else
            echo "No PR opened yet for Phase ${{ steps.phase.outputs.next }} — the hourly cron will retry."
          fi
